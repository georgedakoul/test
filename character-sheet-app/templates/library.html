{% extends "base.html" %}
{% block title %}Library — Shadowdark RPG{% endblock %}

{% block head %}
<style>
  .bookshelf {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1.25rem;
  }
  .book-card {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: var(--text-primary);
    transition: var(--trans);
  }
  .book-card:hover {
    transform: translateY(-4px);
    text-decoration: none;
  }
  .book-cover-wrap {
    position: relative;
    aspect-ratio: 0.7;
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg-panel-alt);
    box-shadow: 2px 4px 12px rgba(0,0,0,.5);
    transition: box-shadow .2s;
  }
  .book-card:hover .book-cover-wrap {
    box-shadow: 2px 6px 20px rgba(0,0,0,.7), 0 0 0 1px var(--bronze-dark);
  }
  .book-cover-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .book-cover-wrap .no-cover {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    font-size: 2.5rem;
    color: var(--text-muted);
  }
  .book-title {
    margin-top: .5rem;
    font-family: var(--font-h);
    font-size: .85rem;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .book-cat {
    font-size: .75rem;
    color: var(--text-muted);
    margin-top: .15rem;
  }

  @media (max-width: 600px) {
    .bookshelf { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: .75rem; }
    .book-title { font-size: .78rem; }
  }
</style>
{% endblock %}

{% block body %}
<div class="page-wrap">
  <h1 class="page-title">Library</h1>
  <div class="filter-bar">
    <button class="filter-btn active" data-cat="all">All</button>
  </div>
  <div class="bookshelf" id="bookshelf">
    <div class="placeholder-msg">
      <div class="icon">&#128214;</div>
      <h2>Loading Books...</h2>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function(){
  const shelf    = document.getElementById('bookshelf');
  const filterBar = document.querySelector('.filter-bar');
  let allBooks   = [];
  let filterCat  = 'all';

  fetch('/api/books').then(r=>r.json()).then(books => {
    allBooks = books;

    // Build category filter buttons
    const cats = [...new Set(books.map(b => b.category))];
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.cat = c;
      btn.textContent = c;
      filterBar.appendChild(btn);
    });

    filterBar.querySelectorAll('[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => {
        filterBar.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterCat = btn.dataset.cat;
        render();
      });
    });

    render();
  });

  function render() {
    const list = allBooks.filter(b => filterCat === 'all' || b.category === filterCat);
    if (!list.length) {
      shelf.innerHTML = '<p style="color:var(--text-muted)">No books found.</p>';
      return;
    }

    shelf.innerHTML = list.map(b => {
      const coverUrl = '/static/images/covers/' + b.id + '.jpg';
      return `<a class="book-card" href="/library/read/${b.id}">
        <div class="book-cover-wrap">
          <img src="${coverUrl}" alt="${b.title}" onerror="this.outerHTML='<div class=no-cover>&#128214;</div>'">
        </div>
        <div class="book-title">${b.title}</div>
        <div class="book-cat">${b.category}</div>
      </a>`;
    }).join('');
  }
})();
</script>
{% endblock %}
