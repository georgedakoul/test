{% extends "base.html" %}
{% block title %}Reader — Shadowdark RPG{% endblock %}

{% block head %}
<style>
  .reader-wrap {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 50px);
    background: #0a0a0a;
  }
  .reader-toolbar {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .4rem 1rem;
    background: var(--hdr-bg);
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
  }
  .reader-toolbar a {
    color: var(--text-secondary);
    font-size: .85rem;
    text-decoration: none;
  }
  .reader-toolbar a:hover { color: var(--bronze); }
  .reader-title {
    flex: 1;
    font-family: var(--font-h);
    font-size: .95rem;
    color: var(--bronze);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .reader-btn {
    background: var(--bg-panel-alt);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-size: .85rem;
    padding: .3rem .6rem;
    cursor: pointer;
    transition: var(--trans);
    font-family: var(--font-b);
  }
  .reader-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
    border-color: var(--bronze-dark);
  }
  .page-info {
    color: var(--text-muted);
    font-size: .8rem;
    min-width: 80px;
    text-align: center;
  }
  .reader-frame {
    flex: 1;
    width: 100%;
    border: none;
  }
</style>
{% endblock %}

{% block body %}
<div class="reader-wrap">
  <div class="reader-toolbar">
    <a href="/library">&larr; Library</a>
    <span class="reader-title" id="reader-title">Loading...</span>
    <button class="reader-btn" id="btn-prev" title="Previous page">&#9664;</button>
    <span class="page-info" id="page-info">—</span>
    <button class="reader-btn" id="btn-next" title="Next page">&#9654;</button>
    <button class="reader-btn" id="btn-zout" title="Zoom out">&#8722;</button>
    <button class="reader-btn" id="btn-zin" title="Zoom in">&#43;</button>
    <button class="reader-btn" id="btn-full" title="Fullscreen">&#9974;</button>
  </div>
  <iframe class="reader-frame" id="pdf-frame"></iframe>
</div>
{% endblock %}

{% block scripts %}
<script>
(function(){
  const bookId = "{{ book_id }}";
  const frame  = document.getElementById('pdf-frame');
  const title  = document.getElementById('reader-title');

  // Load book info
  fetch('/api/books').then(r=>r.json()).then(books => {
    const book = books.find(b => b.id === bookId);
    if (book) title.textContent = book.title;
  });

  // Load PDF in iframe with built-in browser viewer
  const pdfUrl = '/api/books/' + bookId + '/pdf';
  frame.src = pdfUrl;

  // Fullscreen
  document.getElementById('btn-full').addEventListener('click', () => {
    if (frame.requestFullscreen) frame.requestFullscreen();
    else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
  });

  // Zoom and page nav work via the browser's built-in PDF viewer
  // These buttons provide fallback controls
  document.getElementById('btn-zin').addEventListener('click', () => {
    frame.contentWindow.postMessage({type: 'zoomIn'}, '*');
  });
  document.getElementById('btn-zout').addEventListener('click', () => {
    frame.contentWindow.postMessage({type: 'zoomOut'}, '*');
  });
  document.getElementById('btn-prev').addEventListener('click', () => {
    frame.contentWindow.postMessage({type: 'previousPage'}, '*');
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    frame.contentWindow.postMessage({type: 'nextPage'}, '*');
  });
})();
</script>
{% endblock %}
